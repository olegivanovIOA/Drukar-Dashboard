<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Склад · Друкар</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
  }
  h2 {
    font-size: 18px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
  }
  .deal-info {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 20px;
    padding: 8px 12px;
    background: #f9fafb;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
  }
  .deal-info b { color: #111; }
  .btn-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .btn-wh {
    flex: 1;
    padding: 18px 8px;
    border: 2px solid transparent;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all .15s;
    background: none;
  }
  .btn-wh .icon { font-size: 26px; }
  .btn-wh .lbl  { font-size: 14px; font-weight: 700; }
  .btn-wh .sub  { font-size: 10px; font-weight: 400; opacity: .65; }
  .w1 { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
  .w1:hover { background: #dbeafe; border-color: #60a5fa; }
  .w1.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
  .w2 { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
  .w2:hover { background: #dcfce7; border-color: #4ade80; }
  .w2.active { background: #15803d; color: #fff; border-color: #15803d; }
  .w3 { background: #f9fafb; color: #9ca3af; border-color: #e5e7eb; cursor: not-allowed; }
  .btn-wh:disabled { opacity: .4; cursor: not-allowed; }
  #status {
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
    white-space: pre-line;
  }
  .s-info    { background: #eff6ff; color: #1e40af; display: block!important; }
  .s-ok      { background: #f0fdf4; color: #166534; display: block!important; }
  .s-err     { background: #fef2f2; color: #991b1b; display: block!important; }
  .prods {
    margin-top: 12px;
    font-size: 12px;
    color: #374151;
    padding: 10px 12px;
    background: #f9fafb;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    line-height: 1.8;
    display: none;
  }
  .prods.show { display: block; }
  .warn-box {
    margin-top: 14px;
    padding: 10px 12px;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: 8px;
    font-size: 12px;
    color: #9a3412;
  }
</style>
</head>
<body>
<div class="card">
  <h2>📦 Призначити склад</h2>

  <div class="deal-info">
    Угода: <b id="dealLabel">…</b> &nbsp;·&nbsp; Поточний склад: <b id="curWh">…</b>
  </div>

  <div class="btn-row">
    <button class="btn-wh w1" onclick="applyWH(1)" id="b1" disabled>
      <span class="icon">🏭</span>
      <span class="lbl">Склад 1</span>
      <span class="sub">Локація 1</span>
    </button>
    <button class="btn-wh w2" onclick="applyWH(2)" id="b2" disabled>
      <span class="icon">🏗</span>
      <span class="lbl">Склад 2</span>
      <span class="sub">Локація 2</span>
    </button>
    <button class="btn-wh w3" disabled>
      <span class="icon">📦</span>
      <span class="lbl">Склад 3</span>
      <span class="sub">незабаром</span>
    </button>
  </div>

  <div id="status"></div>
  <div class="prods" id="prods"></div>

  <div class="warn-box">
    ⚠️ Оновлюй склад <b>до</b> переведення на «Матеріали витрачено»
  </div>
</div>

<script>
// ── КОНФІГ ──────────────────────────────────────────────────
var WEBHOOK = 'https://b24-733cj8.bitrix24.eu/rest/2517/gyj1j3mxsy5x3g55';
var FIELD_WH = 'UF_CRM_1774265771387';
var WH = {
  1: { dealVal: '123', storeId: 1,  label: 'Склад 1' },
  2: { dealVal: '125', storeId: 3,  label: 'Склад 2' },
};
var VAL_LABEL = { '123': 'Склад 1', '125': 'Склад 2' };

var DEAL_ID  = null;
var PRODUCTS = [];

// ── ОТРИМУЄМО DEAL ID З URL ──────────────────────────────────
// Робот передає: .../drukar_warehouse_app.html?ID=12345
function getDealId() {
  var p = new URLSearchParams(window.location.search);
  return p.get('ID') || p.get('id') || p.get('DEAL_ID') ||
         window.location.hash.replace('#','') || null;
}

// ── REST HELPER ──────────────────────────────────────────────
function restGet(method, params) {
  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  return fetch(WEBHOOK + '/' + method + '.json?' + qs)
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.error) throw new Error(j.error_description || j.error);
      return j.result;
    });
}

function restPost(method, body) {
  var fd = new URLSearchParams();
  function flatten(obj, prefix) {
    Object.keys(obj).forEach(function(k) {
      var key = prefix ? prefix + '[' + k + ']' : k;
      var val = obj[k];
      if (val === null || val === undefined) { fd.append(key, ''); return; }
      if (Array.isArray(val)) {
        val.forEach(function(v, i) { flatten(v, key + '[' + i + ']'); });
      } else if (typeof val === 'object') {
        flatten(val, key);
      } else {
        fd.append(key, val);
      }
    });
  }
  flatten(body, '');
  return fetch(WEBHOOK + '/' + method + '.json', {
    method: 'POST',
    body: fd
  }).then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.error) throw new Error(j.error_description || j.error);
      return j.result;
    });
}

// ── UI ХЕЛПЕРИ ───────────────────────────────────────────────
function st(cls, msg) {
  var el = document.getElementById('status');
  el.className = cls; el.textContent = msg;
}

function setBtns(enabled, activeVal) {
  [1, 2].forEach(function(n) {
    var b = document.getElementById('b' + n);
    b.disabled = !enabled;
    b.classList.toggle('active', WH[n].dealVal === String(activeVal));
  });
}

function showProds(rows, label) {
  var el = document.getElementById('prods');
  if (!rows || !rows.length) { el.classList.remove('show'); return; }
  el.innerHTML = (label ? '<b>→ ' + label + '</b><br>' : '') +
    rows.map(function(p) {
      return '• ' + (p.PRODUCT_NAME || 'ID ' + p.PRODUCT_ID) +
             ' × ' + p.QUANTITY +
             (p.STORE_ID ? ' <span style="color:#6b7280">[склад ' + p.STORE_ID + ']</span>' : '');
    }).join('<br>');
  el.classList.add('show');
}

// ── ЗАВАНТАЖЕННЯ УГОДИ ───────────────────────────────────────
function loadDeal() {
  st('s-info', '⏳ Завантаження угоди #' + DEAL_ID + '…');

  Promise.all([
    restGet('crm.deal.get', { id: DEAL_ID }),
    restGet('crm.deal.productrows.get', { id: DEAL_ID }),
  ]).then(function(res) {
    var deal  = res[0];
    var prods = res[1];
    PRODUCTS  = prods || [];

    var curVal   = deal[FIELD_WH];
    var curLabel = VAL_LABEL[curVal] || (curVal ? 'ID:' + curVal : 'не вказано');

    document.getElementById('dealLabel').textContent = '#' + DEAL_ID;
    document.getElementById('curWh').textContent = curLabel;

    showProds(PRODUCTS);
    setBtns(true, curVal);
    document.getElementById('status').style.display = 'none';

  }).catch(function(e) {
    st('s-err', '❌ ' + e.message);
  });
}

// ── ЗАСТОСУВАННЯ СКЛАДУ ──────────────────────────────────────
function applyWH(num) {
  var wh = WH[num];
  setBtns(false, null);
  st('s-info', '⏳ Записуємо ' + wh.label + '…');

  // Крок 1: оновлюємо поле угоди
  restPost('crm.deal.update', {
    id: DEAL_ID,
    fields: { [FIELD_WH]: wh.dealVal }
  })
  .then(function() {
    if (!PRODUCTS.length) {
      document.getElementById('curWh').textContent = wh.label;
      setBtns(true, wh.dealVal);
      st('s-ok', '✅ ' + wh.label + ' встановлено!\nПозицій товарів немає.');
      return;
    }

    // Крок 2: спробуємо ajax.php (якщо відкрито з B24 браузера)
    var sessid = '';
    if (window.BX && BX.bitrix_sessid) sessid = BX.bitrix_sessid();

    if (sessid) {
      // Перевірений метод з браузера B24
      return updateViaAjax(wh, sessid);
    } else {
      // Відкрито в зовнішньому браузері — використовуємо REST
      return updateViaRest(wh);
    }
  })
  .catch(function(e) {
    st('s-err', '❌ ' + e.message);
    setBtns(true, null);
  });
}

// Метод 1: ajax.php — працює з браузера де відкритий B24
function updateViaAjax(wh, sessid) {
  var updated = PRODUCTS.map(function(p) {
    return {
      ID: p.ID, PRODUCT_ID: p.PRODUCT_ID, PRODUCT_NAME: p.PRODUCT_NAME,
      QUANTITY: p.QUANTITY, STORE_ID: wh.storeId,
      PRICE: 0, CURRENCY: 'UAH', TYPE: 4,
      CUSTOMIZED: 'Y', TAX_RATE: null, TAX_INCLUDED: 'N'
    };
  });
  var body = new URLSearchParams();
  body.append('ACTION', 'SAVE');
  body.append('ACTION_ENTITY_TYPE', 'D');
  body.append('ACTION_ENTITY_ID', DEAL_ID);
  body.append('DEAL_PRODUCT_DATA', JSON.stringify(updated));
  body.append('PARAMS[CATEGORY_ID]', '1');
  body.append('EDITOR_CONFIG_ID', 'deal_details_c_1');
  body.append('ASSIGNED_BY_ID', '2517');
  body.append('IS_MANUAL_OPPORTUNITY', 'N');
  body.append('DEAL_PRODUCT_DATA_SETTINGS', '{"ENABLE_DISCOUNT":"N","ENABLE_TAX":"N"}');
  body.append('ENABLE_REQUIRED_USER_FIELD_CHECK', 'Y');

  return fetch('/bitrix/components/bitrix/crm.deal.details/ajax.php?sessid=' + sessid, {
    method: 'POST',
    headers: { 'Bx-ajax': 'true', 'X-Requested-With': 'XMLHttpRequest' },
    body: body
  }).then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.ENTITY_ID) throw new Error(JSON.stringify(res));
      finishSuccess(wh, updated.length);
    });
}

// Метод 2: REST — відкрито в зовнішньому браузері
function updateViaRest(wh) {
  var rows = PRODUCTS.map(function(p) {
    return {
      ID: p.ID, PRODUCT_ID: p.PRODUCT_ID,
      PRODUCT_NAME: p.PRODUCT_NAME,
      PRICE: p.PRICE, QUANTITY: p.QUANTITY,
      STORE_ID: wh.storeId
    };
  });
  return restPost('crm.deal.productrows.set', { id: DEAL_ID, rows: rows })
    .then(function() { finishSuccess(wh, rows.length); })
    .catch(function(e) {
      // REST не може змінити STORE_ID — попереджаємо
      document.getElementById('curWh').textContent = wh.label;
      setBtns(true, wh.dealVal);
      st('s-err',
        '⚠️ Поле угоди оновлено (' + wh.label + ').\n\n' +
        'STORE_ID в позиціях не змінено — це обмеження Bitrix REST API.\n\n' +
        'Для повного оновлення відкрий угоду в браузері де\n' +
        'авторизований Bitrix24, і натисни кнопку знову.'
      );
    });
}

function finishSuccess(wh, count) {
  PRODUCTS = PRODUCTS.map(function(p) {
    return Object.assign({}, p, { STORE_ID: wh.storeId });
  });
  document.getElementById('curWh').textContent = wh.label;
  setBtns(true, wh.dealVal);
  st('s-ok', '✅ ' + wh.label + ' встановлено!\n📋 Позицій оновлено: ' + count);
  showProds(PRODUCTS, wh.label);
}

// ── СТАРТ ────────────────────────────────────────────────────
DEAL_ID = getDealId();

if (!DEAL_ID) {
  document.getElementById('dealLabel').textContent = 'не визначено';
  st('s-err',
    '⚠️ ID угоди не передано.\n\n' +
    'Посилання має виглядати так:\n' +
    'drukar_warehouse_app.html?ID=12345'
  );
} else {
  loadDeal();
}
</script>
</body>
</html>
